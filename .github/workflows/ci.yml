name: ci

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@v7.6.0
      - run: make license-check

  lint:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6.0.1
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - run: |
          GOLANGCI_LINT_VERSION="$(grep '^GOLANGCI_LINT_VERSION' Makefile | cut -d '=' -f2 | xargs)"
          echo "GOLANGCI_LINT_VERSION=${GOLANGCI_LINT_VERSION}" >> "${GITHUB_ENV}"
      - uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v${{ env.GOLANGCI_LINT_VERSION }}

  build:
    runs-on: ${{ matrix.os }}
    needs: [license-check]
    strategy:
      matrix:
        include:
          - { goos: "linux", goarch: "amd64", os: "ubuntu-latest" }
          - { goos: "linux", goarch: "arm64", os: "ubuntu-24.04-arm" }
          - { goos: "darwin", goarch: "amd64", os: "macos-26-intel" }
          - { goos: "darwin", goarch: "arm64", os: "macos-latest" }
          - { goos: "windows", goarch: "amd64", os: "windows-latest" }
          - { goos: "windows", goarch: "arm64", os: "windows-11-arm" }
      fail-fast: false
    steps:
      - uses: actions/checkout@v6.0.1
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - run: make build GOFLAGS="-v"

  test:
    runs-on: ${{ matrix.os }}
    needs: [build]
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-26-intel
          - macos-latest
          - windows-latest
          - windows-11-arm
      fail-fast: false
    steps:
      - uses: actions/checkout@v6.0.1
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - run: make test GOFLAGS="-v"

  package:
    runs-on: ${{ matrix.os }}
    needs: [build, lint, test]
    strategy:
      matrix:
        include:
          - { goos: "linux", goarch: "amd64", os: "ubuntu-latest" }
          - { goos: "linux", goarch: "arm64", os: "ubuntu-24.04-arm" }
          - { goos: "darwin", goarch: "amd64", os: "macos-26-intel" }
          - { goos: "darwin", goarch: "arm64", os: "macos-latest" }
          - { goos: "windows", goarch: "amd64", os: "windows-latest" }
          - { goos: "windows", goarch: "arm64", os: "windows-11-arm" }
      fail-fast: false
    steps:
      - uses: actions/checkout@v6.0.1
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - shell: bash
        run: |
          RATATOSKR_VERSION="$(grep '^RATATOSKR_VERSION' Makefile | cut -d '=' -f2 | xargs)"
          BASE_VERSION="${RATATOSKR_VERSION}-canary.${{ github.run_number }}"
          VERSION="${BASE_VERSION}+${{ github.sha }}.$(date -u +"%Y%m%d%H%M%S")"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "ARTIFACT_NAME=ratatoskr-${BASE_VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}" >> "${GITHUB_ENV}"
          echo "BUILD_OUTPUT=ratatoskr$(go env GOEXE)" >> "${GITHUB_ENV}"
      - run: make build GOFLAGS="-v" VERSION="${{ env.VERSION }}"
      - uses: actions/upload-artifact@v6.0.0
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.BUILD_OUTPUT }}
          if-no-files-found: error
